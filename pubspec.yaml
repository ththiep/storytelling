name: storytelling
description: Storytelling app with narrated audio and karaoke text per page.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  equatable: ^2.1.0
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  just_audio: ^0.10.6
  dio: ^5.10.0
  google_fonts: ^6.2.1
  permission_handler: ^12.0.3
  record: ^7.1.1
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  bloc_test: ^10.0.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/stories/thanh-giong/
    - assets/stories/thanh-giong/pages/
    - assets/stories/de-men-phieu-luu-ky/
    - assets/stories/cay-khe/
    - assets/stories/hoa-tan/
    - assets/stories/ai-han-mieu-thanh-huong/
    - assets/stories/huyet-sac/
    - assets/ui/backgrounds/
    - assets/ui/icons/
